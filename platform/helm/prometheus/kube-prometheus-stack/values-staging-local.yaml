kube-prometheus-stack:
  kubeControllerManager:
    enabled: false

  coreDns:
    enabled: false

  kubeEtcd:
    enabled: false

  kubeScheduler:
    enabled: false

  kubeProxy:
    enabled: false

  prometheus:
    prometheusSpec:
      retentionSize: 1GiB
      storageSpec:
        volumeClaimTemplate:
          spec:
            accessModes:
              - ReadWriteOnce
            resources:
              requests:
                storage: 2Gi
      resources:
        requests:
          cpu: 100m
          memory: 384Mi
        limits:
          cpu: 250m
          memory: 768Mi
