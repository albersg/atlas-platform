apiVersion: apps/v1
kind: Deployment
metadata:
  name: argocd-repo-server
  namespace: argocd
spec:
  template:
    spec:
      initContainers:
        - name: install-ksops-tools
          image: public.ecr.aws/docker/library/alpine:3.21
          imagePullPolicy: IfNotPresent
          env:
            - name: KSOPS_URL
              value: https://github.com/viaduct-ai/kustomize-sops/releases/download/v4.4.0/ksops_4.4.0_Linux_x86_64.tar.gz
            - name: KSOPS_SHA256
              value: 72973ce5a97d7ad0318c9f6ae4df2aa94a4a564c45fdf71772b759dff4df0cb4 # pragma: allowlist secret
            - name: KUSTOMIZE_URL
              value: https://github.com/kubernetes-sigs/kustomize/releases/download/kustomize/v5.4.3/kustomize_v5.4.3_linux_amd64.tar.gz
            - name: KUSTOMIZE_SHA256
              value: 3669470b454d865c8184d6bce78df05e977c9aea31c30df3c669317d43bcc7a7 # pragma: allowlist secret
            - name: HELM_URL
              value: https://get.helm.sh/helm-v3.16.4-linux-amd64.tar.gz
            - name: HELM_SHA256
              value: fc307327959aa38ed8f9f7e66d45492bb022a66c3e5da6063958254b9767d179 # pragma: allowlist secret
          command:
            - sh
            - -ec
            - |
              apk add --no-cache curl tar
              mkdir -p /custom-tools/bin /custom-tools/kustomize/plugin/viaduct.ai/v1/ksops
              mkdir -p /custom-tools/helm/cache /custom-tools/helm/config /custom-tools/helm/data

              download_and_extract() {
                local url="$1"
                local expected_sha256="$2"
                local target_dir="$3"
                local archive

                archive="$(mktemp)"
                curl --retry 5 --retry-delay 2 --retry-all-errors -fsSL "$url" -o "$archive"
                printf '%s  %s\n' "$expected_sha256" "$archive" | sha256sum -c - >/dev/null
                tar --no-same-owner -xzf "$archive" -C "$target_dir"
                rm -f "$archive"
              }

              download_and_extract "$KSOPS_URL" "$KSOPS_SHA256" /custom-tools/bin
              download_and_extract "$KUSTOMIZE_URL" "$KUSTOMIZE_SHA256" /custom-tools/bin
              download_and_extract "$HELM_URL" "$HELM_SHA256" /tmp
              cp /tmp/linux-amd64/helm /custom-tools/bin/helm
              chmod +x /custom-tools/bin/ksops /custom-tools/bin/kustomize
              chmod +x /custom-tools/bin/helm
              ln -sf /custom-tools/bin/ksops /custom-tools/kustomize/plugin/viaduct.ai/v1/ksops/ksops
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            readOnlyRootFilesystem: false
            runAsNonRoot: false
            runAsUser: 0
            seccompProfile:
              type: RuntimeDefault
          volumeMounts:
            - name: custom-tools
              mountPath: /custom-tools
      containers:
        - name: ksops
          image: quay.io/argoproj/argocd:v2.13.3
          imagePullPolicy: IfNotPresent
          command:
            - /var/run/argocd/argocd-cmp-server
          env:
            - name: PATH
              value: /custom-tools/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
            - name: XDG_CONFIG_HOME
              value: /custom-tools
            - name: HELM_CACHE_HOME
              value: /custom-tools/helm/cache
            - name: HELM_CONFIG_HOME
              value: /custom-tools/helm/config
            - name: HELM_DATA_HOME
              value: /custom-tools/helm/data
            - name: SOPS_AGE_KEY_FILE
              value: /sops-age/keys.txt
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            seccompProfile:
              type: RuntimeDefault
          volumeMounts:
            - name: var-files
              mountPath: /var/run/argocd
            - name: plugins
              mountPath: /home/argocd/cmp-server/plugins
            - name: cmp-plugin
              mountPath: /home/argocd/cmp-server/config/plugin.yaml
              subPath: plugin.yaml
            - name: cmp-tmp
              mountPath: /tmp
            - name: custom-tools
              mountPath: /custom-tools
            - name: sops-age-key
              mountPath: /sops-age
              readOnly: true
      volumes:
        - name: cmp-plugin
          configMap:
            name: ksops-cmp-plugin
        - name: cmp-tmp
          emptyDir: {}
        - name: custom-tools
          emptyDir: {}
        - name: sops-age-key
          secret:
            secretName: argocd-sops-age-key # pragma: allowlist secret
            optional: true
