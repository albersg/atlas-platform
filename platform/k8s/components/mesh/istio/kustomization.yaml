apiVersion: kustomize.config.k8s.io/v1alpha1
kind: Component

resources:
  - gateway.yaml
  - virtualservice.yaml
  - destinationrule.yaml
  - peerauthentication.yaml
  - authorizationpolicy.yaml
  - networkpolicy-mesh-control-plane-egress.yaml

patches:
  - path: patches/web-sidecar-injection.yaml
    target:
      kind: Deployment
      name: web
  - path: patches/inventory-service-sidecar-injection.yaml
    target:
      kind: Deployment
      name: inventory-service
  - path: patches/inventory-migration-sidecar-injection.yaml
    target:
      kind: Job
      name: inventory-migration
  - path: networkpolicy-patches/web-ingress-from-istio-gateway.yaml
    target:
      kind: NetworkPolicy
      name: web
  - path: networkpolicy-patches/inventory-service-ingress-from-istio-gateway.yaml
    target:
      kind: NetworkPolicy
      name: inventory-service
