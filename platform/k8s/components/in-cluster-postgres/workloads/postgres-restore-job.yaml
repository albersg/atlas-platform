apiVersion: batch/v1
kind: Job
metadata:
  name: __JOB_NAME__
  namespace: __NAMESPACE__
spec:
  ttlSecondsAfterFinished: 3600
  backoffLimit: 0
  template:
    metadata:
      labels:
        app: __JOB_NAME__
        atlas-postgres-access: "true"
    spec:
      restartPolicy: Never
      automountServiceAccountToken: false
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: postgres-restore
          image: __POSTGRES_IMAGE__
          imagePullPolicy: IfNotPresent
          command:
            - sh
            - -ec
            - |
              attempts=0
              until [ -f "$RESTORE_PATH" ]; do
                attempts=$((attempts + 1))
                if [ "$attempts" -ge "$RESTORE_WAIT_SECONDS" ]; then
                  echo "No llego el archivo de restore a $RESTORE_PATH" >&2
                  exit 1
                fi
                sleep 1
              done
              pg_restore -h "$POSTGRES_HOST" -U "$POSTGRES_USER" -d "$POSTGRES_DB" \
                --clean --if-exists --no-owner --no-privileges "$RESTORE_PATH"
          env:
            - name: POSTGRES_HOST
              value: __POSTGRES_HOST__
            - name: POSTGRES_DB
              valueFrom:
                secretKeyRef:
                  name: __POSTGRES_SECRET_NAME__
                  key: POSTGRES_DB
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: __POSTGRES_SECRET_NAME__
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: __POSTGRES_SECRET_NAME__
                  key: POSTGRES_PASSWORD
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: __POSTGRES_SECRET_NAME__
                  key: POSTGRES_PASSWORD
            - name: RESTORE_PATH
              value: __RESTORE_PATH__
            - name: RESTORE_WAIT_SECONDS
              value: "__RESTORE_WAIT_SECONDS__"
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 256Mi
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            runAsUser: 70
            runAsGroup: 70
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: restore-data
              mountPath: /restore
      volumes:
        - name: restore-data
          emptyDir: {}
