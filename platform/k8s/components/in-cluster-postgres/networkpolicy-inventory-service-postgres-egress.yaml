apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: inventory-service-postgres-egress
spec:
  podSelector:
    matchLabels:
      app: inventory-service
  policyTypes:
    - Egress
  egress:
    - to:
        - podSelector:
            matchLabels:
              app: postgres
      ports:
        - protocol: TCP
          port: 5432
