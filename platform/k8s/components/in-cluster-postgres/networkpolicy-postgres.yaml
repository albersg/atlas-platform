apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: postgres
spec:
  podSelector:
    matchLabels:
      app: postgres
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: inventory-service
        - podSelector:
            matchLabels:
              app: inventory-migration
        - podSelector:
            matchLabels:
              atlas-postgres-access: "true"
      ports:
        - protocol: TCP
          port: 5432
