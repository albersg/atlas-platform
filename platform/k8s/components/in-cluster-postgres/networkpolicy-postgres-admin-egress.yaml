apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: postgres-admin-egress
spec:
  podSelector:
    matchLabels:
      atlas-postgres-access: "true"
  policyTypes:
    - Egress
  egress:
    - to:
        - podSelector:
            matchLabels:
              app: postgres
      ports:
        - protocol: TCP
          port: 5432
