apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: inventory-service
  labels:
    app: inventory-service
    release: atlas-platform-prometheus
spec:
  jobLabel: app
  selector:
    matchLabels:
      app: inventory-service
  namespaceSelector:
    matchNames:
      - atlas-platform-staging
  endpoints:
    - port: http
      path: /metrics
      interval: 30s
      scrapeTimeout: 10s
