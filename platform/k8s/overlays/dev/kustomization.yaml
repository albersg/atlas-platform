apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: atlas-platform-dev

resources:
  - namespace.yaml
  - limitrange.yaml
  - resourcequota.yaml
  - ../../base
  - ../../components/in-cluster-postgres

generators:
  - ksops-generator.yaml

components:
  - ../../components/images/dev
  - ../../components/ingress/traefik

patches:
  - target:
      kind: Deployment
      name: inventory-service
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 1
  - target:
      kind: Deployment
      name: web
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 1
  - target:
      kind: HorizontalPodAutoscaler
      name: inventory-service
    patch: |-
      - op: replace
        path: /spec/minReplicas
        value: 1
      - op: replace
        path: /spec/maxReplicas
        value: 2
  - target:
      kind: HorizontalPodAutoscaler
      name: web
    patch: |-
      - op: replace
        path: /spec/minReplicas
        value: 1
      - op: replace
        path: /spec/maxReplicas
        value: 2
  - target:
      kind: PodDisruptionBudget
      name: inventory-service-pdb
    patch: |-
      - op: replace
        path: /spec/minAvailable
        value: 0
  - target:
      kind: PodDisruptionBudget
      name: web-pdb
    patch: |-
      - op: replace
        path: /spec/minAvailable
        value: 0
  - target:
      kind: ConfigMap
      name: inventory-config
    patch: |-
      - op: replace
        path: /data/INVENTORY_APP_ENV
        value: dev
