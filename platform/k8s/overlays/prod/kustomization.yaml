apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: atlas-platform

resources:
  - ../../base

patches:
  - target:
      kind: ConfigMap
      name: inventory-config
    patch: |-
      - op: replace
        path: /data/INVENTORY_APP_ENV
        value: prod
  - target:
      kind: Ingress
      name: atlas-ingress
    patch: |-
      - op: replace
        path: /spec/rules/0/host
        value: atlas.example.com
      - op: replace
        path: /spec/rules/1/host
        value: api.atlas.example.com
