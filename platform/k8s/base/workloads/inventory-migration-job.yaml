apiVersion: batch/v1
kind: Job
metadata:
  name: inventory-migration
  annotations:
    argocd.argoproj.io/hook: PreSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation,HookSucceeded
    argocd.argoproj.io/sync-wave: "-1"
spec:
  completions: 1
  parallelism: 1
  backoffLimit: 3
  ttlSecondsAfterFinished: 3600
  activeDeadlineSeconds: 900
  template:
    metadata:
      labels:
        app: inventory-migration
    spec:
      automountServiceAccountToken: false
      restartPolicy: OnFailure
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: inventory-migration
          image: ghcr.io/albersg/atlas-inventory-service:main
          imagePullPolicy: IfNotPresent
          command: ["/app/scripts/migrate.sh"]
          env:
            - name: INVENTORY_DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: inventory-secrets
                  key: INVENTORY_DATABASE_URL
            - name: DB_WAIT_MAX_ATTEMPTS
              value: "90"
            - name: DB_WAIT_SLEEP_SECONDS
              value: "2"
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 256Mi
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            runAsUser: 10001
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
