apiVersion: apps/v1
kind: Deployment
metadata:
  name: inventory-service
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  replicas: 2
  minReadySeconds: 5
  progressDeadlineSeconds: 600
  revisionHistoryLimit: 5
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app: inventory-service
  template:
    metadata:
      labels:
        app: inventory-service
    spec:
      automountServiceAccountToken: false
      terminationGracePeriodSeconds: 30
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app: inventory-service
      containers:
        - name: inventory-service
          image: ghcr.io/albersg/atlas-inventory-service:main
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
          env:
            - name: INVENTORY_DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: inventory-secrets
                  key: INVENTORY_DATABASE_URL
            - name: INVENTORY_APP_ENV
              valueFrom:
                configMapKeyRef:
                  name: inventory-config
                  key: INVENTORY_APP_ENV
            - name: RUN_MIGRATIONS_ON_STARTUP
              valueFrom:
                configMapKeyRef:
                  name: inventory-config
                  key: RUN_MIGRATIONS_ON_STARTUP
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            runAsUser: 10001
            runAsGroup: 10001
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: tmp
              mountPath: /tmp
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 5
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8000
            initialDelaySeconds: 20
            periodSeconds: 20
            timeoutSeconds: 2
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /readyz
              port: 8000
            periodSeconds: 5
            failureThreshold: 30
      volumes:
        - name: tmp
          emptyDir: {}
