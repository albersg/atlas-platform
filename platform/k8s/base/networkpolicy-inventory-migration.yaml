apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: inventory-migration
  namespace: atlas-platform
spec:
  podSelector:
    matchLabels:
      app: inventory-migration
  policyTypes:
    - Egress
  egress:
    - to:
        - podSelector:
            matchLabels:
              app: postgres
      ports:
        - protocol: TCP
          port: 5432
