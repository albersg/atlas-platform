version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "05:00"
      timezone: "Europe/Madrid"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "deps:ci"
    commit-message:
      prefix: "chore"
      include: "scope"

  - package-ecosystem: "pip"
    directory: "/services/inventory-service"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "05:10"
      timezone: "Europe/Madrid"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "deps:python"
    commit-message:
      prefix: "chore"
      include: "scope"
    groups:
      python-patch-minor:
        update-types:
          - "minor"
          - "patch"

  - package-ecosystem: "npm"
    directory: "/apps/web"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "05:20"
      timezone: "Europe/Madrid"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "deps:frontend"
    commit-message:
      prefix: "chore"
      include: "scope"
    groups:
      frontend-patch-minor:
        update-types:
          - "minor"
          - "patch"
