name: Promote Staging

on:
  workflow_dispatch:
    inputs:
      inventory_digest:
        description: "Inventory-service image digest (sha256:...)"
        required: true
        type: string
      web_digest:
        description: "Web image digest (sha256:...)"
        required: true
        type: string

concurrency:
  group: promote-staging
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write

jobs:
  promote:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Update staging digests
        env:
          ATLAS_REGISTRY_OWNER: ${{ github.repository_owner }}
        run: |
          ./scripts/release/promote-by-digest.sh staging "${{ inputs.inventory_digest }}" "${{ inputs.web_digest }}"

      - name: Require SOPS key for staging validation
        env:
          SOPS_AGE_KEY: ${{ secrets.SOPS_AGE_KEY }}
        run: |
          test -n "$SOPS_AGE_KEY"

      - name: Materialize SOPS key for render validation
        env:
          SOPS_AGE_KEY: ${{ secrets.SOPS_AGE_KEY }}
        run: |
          mkdir -p .gitops-local/age
          printf '%s' "$SOPS_AGE_KEY" > .gitops-local/age/keys.txt
          chmod 600 .gitops-local/age/keys.txt

      - name: Validate staging overlay and policies
        run: |
          ./scripts/gitops/validate-overlays.sh

      - name: Create promotion pull request
        env:
          ATLAS_REGISTRY_OWNER: ${{ github.repository_owner }}
          GH_TOKEN: ${{ github.token }}
        run: |
          inventory_short="${{ inputs.inventory_digest }}"
          inventory_short="${inventory_short#sha256:}"
          inventory_short="${inventory_short:0:12}"
          web_short="${{ inputs.web_digest }}"
          web_short="${web_short#sha256:}"
          web_short="${web_short:0:12}"
          branch="promotion/staging-${inventory_short}-${web_short}"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git remote set-url origin "https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}.git"

          if git ls-remote --exit-code --heads origin "$branch" >/dev/null 2>&1; then
            git fetch origin "$branch:$branch"
            git switch "$branch"
          else
            git switch -c "$branch"
          fi

          ./scripts/release/promote-by-digest.sh staging "${{ inputs.inventory_digest }}" "${{ inputs.web_digest }}"
          git add platform/k8s/components/images/staging/kustomization.yaml
          if git diff --cached --quiet; then
            existing_pr="$(gh pr list --base main --head "$branch" --json url --jq '.[0].url')"
            if [ -n "$existing_pr" ]; then
              echo "Promotion PR already exists: $existing_pr" >> "$GITHUB_STEP_SUMMARY"
            else
              echo "No staging digest changes detected; nothing to promote." >> "$GITHUB_STEP_SUMMARY"
            fi
            exit 0
          fi

          git commit -m "chore: promote staging image digests"
          git push -u origin "$branch"

          existing_pr="$(gh pr list --base main --head "$branch" --json url --jq '.[0].url')"
          if [ -n "$existing_pr" ]; then
            echo "Promotion PR updated: $existing_pr" >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          gh pr create \
            --base main \
            --head "$branch" \
            --title "chore: promote staging image digests" \
            --body "Promotes staging to inventory digest \`${{ inputs.inventory_digest }}\` and web digest \`${{ inputs.web_digest }}\`."
