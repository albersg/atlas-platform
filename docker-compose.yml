services:
  postgres:
    image: postgres:16-alpine
    container_name: atlas-postgres
    environment:
      POSTGRES_DB: inventory
      POSTGRES_USER: postgres
      POSTGRES_HOST_AUTH_METHOD: trust
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d inventory"]
      interval: 5s
      timeout: 5s
      retries: 10

  inventory-service:
    build:
      context: services/inventory-service
      dockerfile: Dockerfile
    container_name: atlas-inventory-service
    environment:
      INVENTORY_DATABASE_URL: postgresql+psycopg://postgres@postgres:5432/inventory
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/healthz')"]
      interval: 10s
      timeout: 5s
      retries: 10

  web:
    build:
      context: apps/web
      dockerfile: Dockerfile
    container_name: atlas-web
    ports:
      - "8080:8080"
    depends_on:
      inventory-service:
        condition: service_healthy

volumes:
  postgres-data:
