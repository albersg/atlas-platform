site_name: Atlas Platform
site_description: Step-by-step repository, development, and operations documentation for Atlas Platform
repo_url: https://github.com/albersg/atlas-platform
theme:
  name: material
  features:
    - navigation.instant
    - navigation.tracking
    - content.code.copy

markdown_extensions:
  - admonition
  - toc:
      permalink: true

nav:
