site_name: Atlas Platform
site_description: Atlas platform developer documentation
repo_url: https://github.com/albersg/agent-first-codex
theme:
  name: material
  features:
    - navigation.instant
    - navigation.tracking
    - content.code.copy

markdown_extensions:
  - admonition
  - toc:
      permalink: true

nav:
  - Overview: index.md
  - Development:
      - Dependency updates: development/DEPENDENCY_UPDATES.md
      - End-to-end workflow: development/END_TO_END_WORKFLOW.md
  - ADR:
      - Monorepo vs Multirepo: adr/0001-monorepo-vs-multirepo.md
  - Architecture:
      - Hexagonal + Screaming: architecture/hexagonal-screaming-architecture.md
      - Deployment topology: architecture/deployment-topology.md
  - Deployment:
      - Deployment docs overview: deployment/README.md
      - Argo CD + SOPS runbook: deployment/gitops/ARGOCD_SOPS_RUNBOOK.md
      - Image promotion: deployment/releases/IMAGE_PROMOTION.md
      - K3S runbook: deployment/k3s/RUNBOOK.md
  - Operations:
      - Agent-first DevSecOps playbook: AGENT_FIRST_DEVSECOPS_PLAYBOOK.md
