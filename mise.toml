min_version = "2026.3.3"

[tools]
pre-commit = "4.5.1"
actionlint = "1.7.11"
python = "3.12.13"
uv = "0.10.8"
node = "25.8.0"
ruff = "0.15.5"
shellcheck = "0.11.0"
shfmt = "3.12.0"

[tasks.doctor]
description = "Show mise diagnostics plus repository Kubernetes readiness"
run = [
  "mise doctor",
  "mise tasks validate",
  "./scripts/k3s/cluster/doctor.sh"
]

[tasks.bootstrap]
description = "Install toolchain and git hooks"
run = [
  "pre-commit install --install-hooks --hook-type pre-commit --hook-type pre-push"
]

[tasks.app-bootstrap]
description = "Install backend and frontend dependencies for local development"
run = [
  "cd services/inventory-service && uv sync --extra dev",
  "cd apps/web && npm install"
]

[tasks.fmt]
description = "Apply safe auto-fixes"
run = [
  "pre-commit run trailing-whitespace --all-files --hook-stage manual",
  "pre-commit run end-of-file-fixer --all-files --hook-stage manual",
  "pre-commit run mixed-line-ending --all-files --hook-stage manual",
  "pre-commit run shfmt-fix --all-files --hook-stage manual",
  "pre-commit run ruff-format-fix --all-files --hook-stage manual"
]

[tasks.fmt-check]
description = "Verify formatting is already clean"
run = [
  "mise run fmt",
  "git diff --exit-code"
]

[tasks.lint]
description = "Run lint and policy checks with bounded retries for auto-fixing hooks"
run = [
  "pre-commit validate-config",
  '''
max_tries="${MISE_LINT_MAX_TRIES:-3}"
attempt=1
while [ "$attempt" -le "$max_tries" ]; do
  echo "pre-commit lint attempt ${attempt}/${max_tries}"
  if pre-commit run --all-files --show-diff-on-failure; then
    exit 0
  fi

  if [ "$attempt" -eq "$max_tries" ]; then
    echo "lint failed after ${max_tries} attempts" >&2
    exit 1
  fi

  attempt=$((attempt + 1))
done
'''
]

[tasks.security]
description = "Run focused security checks"
run = [
  "pre-commit run detect-private-key --all-files",
  "pre-commit run detect-secrets --all-files",
  "pre-commit run gitleaks --all-files",
  "pre-commit run check-github-workflows --all-files",
  "pre-commit run zizmor --all-files --hook-stage manual"
]

[tasks.test]
description = "Run repository policy tests"
run = [
  "python -m unittest discover -s tests -p 'test_*.py' -v",
  "uv run --project services/inventory-service --extra dev pytest services/inventory-service/tests/unit"
]

[tasks.backend-test-cov]
description = "Run inventory-service tests with coverage"
run = "uv run --project services/inventory-service --extra dev pytest services/inventory-service/tests"

[tasks.backend-typecheck]
description = "Run static type checking for inventory-service"
run = "uv run --project services/inventory-service --extra dev pyright"

[tasks.typecheck]
description = "Run all repository type checks"
run = [
  "mise run backend-typecheck",
  "mise run frontend-typecheck"
]

[tasks.docs-build]
description = "Build MkDocs Material site in strict mode"
run = "uvx --from mkdocs==1.6.1 --with mkdocs-material==9.6.18 mkdocs build --strict"

[tasks.docs-serve]
description = "Serve docs locally with MkDocs Material"
run = "uvx --from mkdocs==1.6.1 --with mkdocs-material==9.6.18 mkdocs serve -a 0.0.0.0:8001"

[tasks.backend-dev]
description = "Run inventory-service locally"
run = "cd services/inventory-service && uv run uvicorn inventory_service.main:app --reload --host 0.0.0.0 --port 8000"

[tasks.backend-migrate]
description = "Apply Alembic migrations for inventory-service"
run = "cd services/inventory-service && uv run alembic upgrade head"

[tasks.backend-test]
description = "Run inventory-service tests with uv"
run = "cd services/inventory-service && uv run --extra dev pytest -q"

[tasks.frontend-dev]
description = "Run web app locally"
run = "cd apps/web && npm run dev"

[tasks.frontend-build]
description = "Build web app"
run = "cd apps/web && npm run build"

[tasks.frontend-typecheck]
description = "Run static type checking for web app"
run = "cd apps/web && npm run typecheck"

[tasks.compose-up]
description = "Start local stack with Docker Compose"
run = "./scripts/compose/require-compose.sh up --build -d"

[tasks.compose-down]
description = "Stop local stack"
run = "./scripts/compose/require-compose.sh down"

[tasks.compose-logs]
description = "Tail stack logs"
run = "./scripts/compose/require-compose.sh logs -f --tail=200"

[tasks.k8s-preflight]
description = "Validate k3s prerequisites and cluster capabilities"
run = "./scripts/k3s/cluster/preflight.sh"

[tasks.k8s-doctor]
description = "Check repository-specific Kubernetes and GitOps readiness"
run = "./scripts/k3s/cluster/doctor.sh"

[tasks.k8s-backup-postgres-staging]
description = "Create a timestamped staging PostgreSQL backup with restore hint"
run = "ATLAS_POSTGRES_ENV=staging ./scripts/k3s/postgres/backup.sh"

[tasks.k8s-restore-postgres-staging]
description = "Restore staging PostgreSQL from BACKUP_FILE with explicit confirmation"
run = "ATLAS_POSTGRES_ENV=staging ./scripts/k3s/postgres/restore.sh"

[tasks.k8s-build-images]
description = "Build local backend/frontend images for k3s dev overlay"
run = "./scripts/k3s/images/build.sh"

[tasks.k8s-import-images]
description = "Import local images into k3s containerd"
run = "./scripts/k3s/images/import.sh"

[tasks.k8s-build-staging-images]
description = "Build local staging image refs for k3s"
run = "./scripts/k3s/images/build-staging.sh"

[tasks.k8s-import-staging-images]
description = "Import local staging image refs into k3s"
run = "./scripts/k3s/images/import-staging.sh"

[tasks.k8s-deploy-dev]
description = "Deploy dev overlay and run smoke checks"
run = "./scripts/k3s/deploy/dev.sh"

[tasks.k8s-smoke]
description = "Run smoke checks against the dev namespace"
run = "./scripts/k3s/verify/smoke.sh dev atlas-platform-dev"

[tasks.k8s-smoke-staging]
description = "Run smoke checks against the staging namespace"
run = "./scripts/k3s/verify/smoke.sh staging atlas-platform-staging"

[tasks.k8s-status]
description = "Show k3s workload, service and ingress status"
run = "./scripts/k3s/cluster/status.sh"

[tasks.k8s-status-staging]
description = "Show staging workload, service and ingress status"
run = "./scripts/k3s/cluster/status.sh atlas-platform-staging"

[tasks.k8s-access]
description = "Print host mapping and access URLs"
run = "./scripts/k3s/cluster/access.sh"

[tasks.k8s-access-staging]
description = "Print staging host mapping and access URLs"
run = "./scripts/k3s/cluster/access.sh atlas-platform-staging staging.atlas.example.com api.staging.atlas.example.com"

[tasks.k8s-delete-dev]
description = "Delete dev overlay resources from k3s"
run = "./scripts/gitops/render-overlay.sh platform/k8s/overlays/dev | kubectl delete -f - --ignore-not-found"

[tasks.k8s-delete-staging]
description = "Safely tear down GitOps-managed staging with explicit confirmation"
run = "./scripts/gitops/delete-staging.sh"

[tasks.gitops-install-tools]
description = "Install local Argo CD, SOPS, age, and kustomize helper binaries"
run = "./scripts/gitops/bootstrap/install-tools.sh"

[tasks.gitops-bootstrap-core]
description = "Install Argo CD core and KSOPS plugin into the current cluster"
run = "./scripts/gitops/bootstrap/install-argocd.sh"

[tasks.gitops-install-age-key]
description = "Create or install the local SOPS age key into the argocd namespace"
run = "./scripts/gitops/bootstrap/install-age-key-secret.sh"

[tasks.gitops-install-repo-credential]
description = "Install the Argo CD repository credential from the local deploy key"
run = "./scripts/gitops/bootstrap/install-repo-credential.sh"

[tasks.gitops-apply-apps]
description = "Apply the Argo CD application bundle for staging"
run = "./scripts/gitops/bootstrap/apply-apps.sh"

[tasks.gitops-apply-staging]
description = "Apply only the staging Argo CD application"
run = "./scripts/gitops/bootstrap/apply-staging-app.sh"

[tasks.gitops-wait-staging]
description = "Wait for the staging Argo CD app"
run = "./scripts/gitops/wait-app.sh atlas-platform-staging"

[tasks.gitops-deploy-staging]
description = "Deploy staging via Argo CD and run smoke checks"
run = "./scripts/gitops/deploy/staging.sh"

[tasks.gitops-render-dev]
description = "Render the encrypted dev overlay locally via KSOPS"
run = "./scripts/gitops/render-overlay.sh platform/k8s/overlays/dev"

[tasks.gitops-render-staging]
description = "Render the encrypted staging overlay locally via KSOPS"
run = "./scripts/gitops/render-overlay.sh platform/k8s/overlays/staging"

[tasks.k8s-validate-overlays]
description = "Render non-production overlays and apply shared plus staging-only policies"
run = "./scripts/gitops/validate-overlays.sh"

[tasks.policy-check]
description = "Run overlay-aware policy validation for dev, staging, and staging-local"
run = "./scripts/gitops/validate-overlays.sh"

[tasks.check]
description = "Run complete local validation"
run = [
  "mise run lint",
  "mise run typecheck",
  "mise run frontend-build",
  "mise run test"
]

[tasks.fix]
description = "Apply all safe auto-fixes"
run = "mise run fmt"

[tasks.hooks-update]
description = "Update pre-commit hook revisions"
run = [
  "pre-commit autoupdate"
]

[tasks.lock]
description = "Update mise lockfile for reproducible installs"
run = "mise lock"

[tasks.ci]
description = "Run CI-equivalent validation path"
run = [
  "mise run fmt-check",
  "mise run check",
  "mise run k8s-validate-overlays",
  "mise run docs-build",
  "mise run security"
]
